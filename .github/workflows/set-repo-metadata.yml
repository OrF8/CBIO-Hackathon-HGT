name: Set Repository Description and Topics

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/set-repo-metadata.yml"
  workflow_dispatch:

permissions:
  administration: write

jobs:
  set-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Set repository description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH /repos/${{ github.repository }} \
            -f description="Graph-based pipeline for detecting horizontal gene transfer (HGT) candidates in bacterial proteomes via k-mer similarity graphs, robust statistical anomaly detection, and taxonomic distance scoring."

      - name: Set repository topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PUT /repos/${{ github.repository }}/topics \
            --input - <<'EOF'
          {"names":["horizontal-gene-transfer","computational-biology","graph-analysis","sequence-analysis","bioinformatics"]}
          EOF
